<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NSFW Detector API Demo</title>
    <style>
        body { font-family: Arial; max-width: 800px; margin: 0 auto; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; border-radius: 10px; padding: 40px; text-align: center; cursor: pointer; }
        button { background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; }
        .safe { background: #d4edda; color: #155724; padding: 15px; border-radius: 8px; }
        .nsfw { background: #f8d7da; color: #721c24; padding: 15px; border-radius: 8px; }
        pre { background: #f4f4f4; padding: 10px; border-radius: 5px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🔍 NSFW Detector API</h1>
    <p>API Endpoint: <code>POST /api/detect</code></p>
    
    <div class="upload-area" id="dropArea">
        📁 Upload gambar atau masukkan URL<br>
        <input type="file" id="fileInput" accept="image/*" style="margin: 10px;">
        <input type="text" id="urlInput" placeholder="Atau masukkan URL gambar" style="width: 80%; padding: 8px; margin: 10px;">
        <button id="detectBtn">🔍 Detect</button>
    </div>
    
    <div id="result"></div>

    <script>
        const API_URL = '/api/detect';
        
        async function detect(file, url) {
            const formData = new FormData();
            if (file) formData.append('image', file);
            if (url) formData.append('url', url);
            
            document.getElementById('result').innerHTML = '<p>⏳ Detecting...</p>';
            
            try {
                const response = await fetch(API_URL, { method: 'POST', body: formData });
                const data = await response.json();
                
                if (!response.ok) throw new Error(data.error || 'Error');
                
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <div class="${data.nsfw ? 'nsfw' : 'safe'}">
                        <strong>${data.nsfw ? '🔞 NSFW' : '✅ SAFE'}</strong>
                        <p>Score: ${(data.score * 100).toFixed(2)}%</p>
                    </div>
                    <h3>Detail Predictions:</h3>
                    <pre>${JSON.stringify(data.predictions, null, 2)}</pre>
                `;
            } catch (error) {
                document.getElementById('result').innerHTML = `<div class="nsfw">❌ Error: ${error.message}</div>`;
            }
        }
        
        document.getElementById('detectBtn').onclick = () => {
            const file = document.getElementById('fileInput').files[0];
            const url = document.getElementById('urlInput').value;
            if (file) detect(file, null);
            else if (url) detect(null, url);
            else alert('Pilih file atau masukkan URL');
        };
        
        document.getElementById('dropArea').ondragover = e => e.preventDefault();
        document.getElementById('dropArea').ondrop = e => {
            e.preventDefault();
            detect(e.dataTransfer.files[0], null);
        };
    </script>
</body>
</html>
